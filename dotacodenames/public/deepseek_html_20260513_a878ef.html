<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Коднеймс Dota 2 — Онлайн игра</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            font-family: 'Segoe UI', system-ui;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        
        /* Экраны */
        .screen {
            background: rgba(0,0,0,0.7);
            border-radius: 32px;
            padding: 30px;
            margin: 20px auto;
            max-width: 500px;
            text-align: center;
            color: #ffd966;
        }
        .screen input {
            padding: 12px;
            font-size: 1.2rem;
            margin: 10px;
            border-radius: 24px;
            border: none;
            text-align: center;
        }
        .screen button {
            background: #b8860b;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 32px;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 8px;
        }
        
        /* Игровой интерфейс */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: #2c1e12e0;
            padding: 15px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
        }
        .team-card {
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
        }
        .red-team { background: #861f1f; color: white; }
        .blue-team { background: #1e4985; color: white; }
        .turn-indicator { background: gold; color: black; padding: 8px 16px; border-radius: 28px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .card {
            aspect-ratio: 1 / 0.9;
            background: #fef2dd;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            padding: 8px;
            cursor: pointer;
            transition: 0.1s;
            border: 2px solid #e9be7a;
            color: #2c1c0c;
            font-size: 0.9rem;
        }
        .card.revealed-red { background: #b12a2a; color: white; border-color: #ffb5b5; }
        .card.revealed-blue { background: #2a6b9e; color: white; }
        .card.revealed-neutral { background: #6f5b47; color: #e9ddd0; text-decoration: line-through; }
        .card.revealed-assassin { background: #1f1a18; color: #db0f0f; }
        .card.disabled { cursor: not-allowed; opacity: 0.7; }
        
        .spymaster-panel {
            background: #0e0c0ad9;
            border-radius: 32px;
            padding: 15px;
            margin-top: 20px;
        }
        .key-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            background: #00000066;
            padding: 10px;
            border-radius: 24px;
        }
        .key-cell {
            aspect-ratio: 1;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.3rem;
        }
        .key-red { background: #e33f3f; }
        .key-blue { background: #3f8ce3; }
        .key-neutral { background: #8b765f; }
        .key-assassin { background: #2b2b2b; color: #ff6a6a; }
        
        .players-list {
            background: #1a1a1a;
            padding: 10px 20px;
            border-radius: 28px;
            font-size: 0.9rem;
        }
        button { background: #b8860b; border: none; padding: 8px 16px; border-radius: 24px; cursor: pointer; }
        @media (max-width: 700px) {
            .grid { gap: 6px; }
            .card { font-size: 0.65rem; padding: 4px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Экран входа -->
    <div id="joinScreen" class="screen">
        <h2>🎮 Коднеймс Dota 2</h2>
        <input type="text" id="roomIdInput" placeholder="ID комнаты" autocomplete="off">
        <br>
        <button onclick="createRoom()">✨ Создать комнату</button>
        <button onclick="joinRoom()">🚪 Войти в комнату</button>
        <div id="errorMsg" style="color: #ff8888; margin-top: 15px;"></div>
    </div>
    
    <!-- Игровой экран -->
    <div id="gameScreen" style="display: none;">
        <div class="game-header">
            <div class="team-card red-team">🔴 КРАСНЫЕ: <span id="redRemaining">0</span></div>
            <div class="team-card blue-team">🔵 СИНИЕ: <span id="blueRemaining">0</span></div>
            <div class="turn-indicator" id="turnIndicator">Ход: --</div>
            <button id="endTurnBtn" style="background:#555;">⏩ Закончить ход</button>
        </div>
        
        <div id="roleSelection" style="background: #000000aa; border-radius: 28px; padding: 15px; margin-bottom: 15px;">
            <h3>Выберите роль</h3>
            <button onclick="selectRole('red', false)">🔴 Игрок (Красные)</button>
            <button onclick="selectRole('red', true)">👑 Шпион (Красные)</button>
            <button onclick="selectRole('blue', false)">🔵 Игрок (Синие)</button>
            <button onclick="selectRole('blue', true)">👑 Шпион (Синие)</button>
            <div id="playersList" class="players-list" style="margin-top: 15px;"></div>
        </div>
        
        <div id="gameBoard" style="display: none;">
            <div id="gameGrid" class="grid"></div>
        </div>
        
        <div id="spymasterView" style="display: none;" class="spymaster-panel">
            <h3>🔐 КЛЮЧ-КАРТА (видите только вы)</h3>
            <div id="keyGrid" class="key-grid"></div>
        </div>
    </div>
</div>

<script>
    let socket = null;
    let currentRoomId = null;
    let myPlayerId = null;
    let myRole = null; // { team, isSpymaster }
    let gameState = null;
    
    function showError(msg) {
        document.getElementById('errorMsg').innerText = msg;
        setTimeout(() => document.getElementById('errorMsg').innerText = '', 3000);
    }
    
    function createRoom() {
        let roomId = document.getElementById('roomIdInput').value.trim();
        if (!roomId) roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        socket = io();
        socket.on('connect', () => {
            socket.emit('createRoom', roomId);
        });
        setupSocketHandlers();
    }
    
    function joinRoom() {
        let roomId = document.getElementById('roomIdInput').value.trim();
        if (!roomId) return showError('Введите ID комнаты');
        socket = io();
        socket.on('connect', () => {
            socket.emit('joinRoom', roomId);
        });
        setupSocketHandlers();
    }
    
    function setupSocketHandlers() {
        socket.on('roomCreated', (data) => {
            currentRoomId = data.roomId;
            myPlayerId = data.playerId;
            document.getElementById('joinScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
        });
        
        socket.on('joinedRoom', (data) => {
            currentRoomId = data.roomId;
            myPlayerId = data.playerId;
            gameState = data.gameState;
            document.getElementById('joinScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            updateRemainingDisplay();
        });
        
        socket.on('playersUpdate', (data) => {
            const playersDiv = document.getElementById('playersList');
            playersDiv.innerHTML = '<strong>В комнате:</strong><br>';
            data.players.forEach(p => {
                let roleText = p.role.team ? `${p.role.team === 'red' ? '🔴' : '🔵'} ${p.role.isSpymaster ? 'Шпион' : 'Игрок'}` : '🤔 Не выбрал';
                playersDiv.innerHTML += `${p.id.substring(0,6)}: ${roleText}<br>`;
            });
        });
        
        socket.on('gameReady', (data) => {
            gameState = data.gameState;
            document.getElementById('roleSelection').style.display = 'none';
            document.getElementById('gameBoard').style.display = 'block';
            if (myRole && myRole.isSpymaster) {
                document.getElementById('spymasterView').style.display = 'block';
                renderSpymasterKey();
            }
            renderGameBoard();
            updateRemainingDisplay();
        });
        
        socket.on('cardRevealed', (data) => {
            if (gameState) {
                gameState.revealed[data.index] = true;
                if (data.turnChange) gameState.currentTurn = data.turnChange;
                if (data.remaining) {
                    gameState.redRemaining = data.remaining.red;
                    gameState.blueRemaining = data.remaining.blue;
                }
                renderGameBoard();
                updateRemainingDisplay();
                updateTurnDisplay();
            }
        });
        
        socket.on('turnChanged', (data) => {
            if (gameState) {
                gameState.currentTurn = data.turn;
                updateTurnDisplay();
            }
        });
        
        socket.on('gameStateUpdate', (data) => {
            if (gameState) {
                gameState.revealed = data.revealed;
                gameState.currentTurn = data.turn;
                renderGameBoard();
                updateTurnDisplay();
            }
        });
        
        socket.on('gameOver', (data) => {
            alert(`🏆 Игра окончена! Победила команда ${data.winner.toUpperCase()}! 🏆`);
        });
        
        socket.on('error', (msg) => {
            showError(msg);
        });
    }
    
    function selectRole(team, isSpymaster) {
        myRole = { team, isSpymaster };
        socket.emit('chooseRole', { roomId: currentRoomId, team, isSpymaster });
        if (isSpymaster) {
            document.getElementById('spymasterView').style.display = 'block';
        }
    }
    
    function renderGameBoard() {
        if (!gameState) return;
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = '';
        for (let i = 0; i < gameState.cards.length; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            if (gameState.revealed[i]) {
                card.classList.add(`revealed-${gameState.colors[i]}`);
                card.style.cursor = 'default';
            } else {
                card.style.cursor = 'pointer';
                // Проверяем, может ли игрок открыть карту
                if (myRole && !myRole.isSpymaster && gameState.gameActive !== false && gameState.currentTurn === myRole.team) {
                    card.onclick = () => socket.emit('revealCard', { roomId: currentRoomId, index: i });
                } else {
                    card.style.cursor = 'not-allowed';
                    card.classList.add('disabled');
                }
            }
            card.innerText = gameState.cards[i];
            grid.appendChild(card);
        }
    }
    
    function renderSpymasterKey() {
        if (!gameState) return;
        const keyGrid = document.getElementById('keyGrid');
        keyGrid.innerHTML = '';
        for (let i = 0; i < gameState.colors.length; i++) {
            const cell = document.createElement('div');
            cell.className = `key-cell key-${gameState.colors[i]}`;
            if (gameState.colors[i] === 'assassin') cell.innerText = '💀';
            else if (gameState.colors[i] === 'red') cell.innerText = 'R';
            else if (gameState.colors[i] === 'blue') cell.innerText = 'B';
            else cell.innerText = 'N';
            keyGrid.appendChild(cell);
        }
    }
    
    function updateRemainingDisplay() {
        if (gameState) {
            document.getElementById('redRemaining').innerText = gameState.redRemaining || 0;
            document.getElementById('blueRemaining').innerText = gameState.blueRemaining || 0;
        }
    }
    
    function updateTurnDisplay() {
        if (gameState) {
            document.getElementById('turnIndicator').innerHTML = `Ход: ${gameState.currentTurn === 'red' ? '🔴 КРАСНЫЕ' : '🔵 СИНИЕ'}`;
        }
    }
    
    document.getElementById('endTurnBtn').onclick = () => {
        if (gameState && myRole && !myRole.isSpymaster) {
            socket.emit('endTurn', { roomId: currentRoomId });
        }
    };
</script>
</body>
</html>
