<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎮 Коднеймс Dota 2 | Герои и предметы</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #1a472a, #0a1f0f);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .screen {
            background: rgba(20, 15, 10, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 30px;
            margin: 40px auto;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255, 215, 120, 0.5);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
        }

        .screen h2 {
            font-size: 2rem;
            color: #ffd966;
            text-shadow: 0 2px 5px #7a4c1a;
            margin-bottom: 25px;
        }

        .screen input {
            width: 90%;
            padding: 15px 20px;
            font-size: 1.2rem;
            background: #2e241a;
            border: 2px solid #d4a259;
            border-radius: 60px;
            color: white;
            text-align: center;
            outline: none;
        }

        .screen input:focus {
            border-color: #ffb347;
            box-shadow: 0 0 12px #ffb347;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: 0.1s linear;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: #e0a800;
            color: #1e2a0e;
            box-shadow: 0 4px 0 #7a4c00;
        }

        .btn-secondary {
            background: #3a2a1f;
            color: #ffdb9f;
            border: 1px solid #b8865b;
        }

        .btn-solo {
            background: #2e5e3b;
            color: #e9ffd6;
            border: 1px solid #96c280;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: #1f1a15cc;
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 80px;
            margin-bottom: 25px;
            border: 1px solid #c9aa5b;
        }

        .team-badge {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            background: #1a1a1a;
        }

        .red-team {
            background: #a12222;
            color: #ffc5c5;
            border-left: 5px solid #ff7b7b;
        }

        .blue-team {
            background: #1e5491;
            color: #cbe5ff;
            border-left: 5px solid #8bcbff;
        }

        .turn-card {
            background: #2c2b1f;
            padding: 8px 20px;
            border-radius: 32px;
            color: #ffdfa5;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin: 25px 0;
        }

        .card {
            aspect-ratio: 1 / 0.9;
            background: linear-gradient(145deg, #fff0db, #fae5c3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            padding: 10px 6px;
            cursor: pointer;
            box-shadow: 0 8px 0 #a57248;
            border: 2px solid #ffd699;
            color: #2c1e10;
            font-weight: 700;
        }

        .card.revealed-red {
            background: #c13b3b;
            color: white;
            box-shadow: 0 4px 0 #6e1a1a;
            transform: translateY(2px);
        }

        .card.revealed-blue {
            background: #3178b6;
            color: white;
            box-shadow: 0 4px 0 #1a446b;
            transform: translateY(2px);
        }

        .card.revealed-neutral {
            background: #7c6a53;
            color: #d9cfbc;
            text-decoration: line-through;
        }

        .card.revealed-assassin {
            background: #251f1c;
            color: #e06666;
        }

        .role-panel {
            background: #0c0a08c9;
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e0aa6e;
        }

        .role-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }

        .role-btn {
            background: #2b2a1f;
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid #ca9a5e;
            color: #ffe1ab;
            font-weight: bold;
            cursor: pointer;
        }

        .role-btn:active {
            transform: scale(0.96);
        }

        .players-list {
            background: #00000066;
            border-radius: 28px;
            padding: 12px 18px;
            color: #fee6bf;
        }

        .spymaster-panel {
            background: #0b0806e0;
            border-radius: 36px;
            padding: 18px;
            margin-top: 20px;
            border: 2px solid #ffcf8a;
        }

        .key-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: #00000070;
            padding: 12px;
            border-radius: 28px;
        }

        .key-cell {
            aspect-ratio: 1;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.6rem;
        }

        .key-red { background: #e64343; }
        .key-blue { background: #4682d9; }
        .key-neutral { background: #947e60; }
        .key-assassin { background: #1f1b18; color: #ff6868; }

        .error-text {
            color: #ffa098;
            background: #3a1a1a;
            padding: 8px;
            border-radius: 40px;
            margin-top: 15px;
        }

        @media (max-width: 700px) {
            .grid { gap: 8px; }
            .card { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="joinScreen" class="screen">
        <h2>🎲 Коднеймс: Dota 2</h2>
        <input type="text" id="roomIdInput" placeholder="ID комнаты (например DOTA)">
        <div class="btn-group">
            <button class="btn btn-primary" onclick="createRoom()">✨ Создать комнату</button>
            <button class="btn btn-secondary" onclick="joinRoom()">🚪 Войти в комнату</button>
            <button class="btn btn-solo" onclick="startSoloMode()">🎮 Тест-режим (играть одному)</button>
        </div>
        <div id="errorMsg"></div>
    </div>

    <div id="gameScreen" style="display: none;">
        <div class="game-header">
            <div class="team-badge red-team">🔴 КРАСНЫЕ: <span id="redRemaining">0</span></div>
            <div class="team-badge blue-team">🔵 СИНИЕ: <span id="blueRemaining">0</span></div>
            <div class="turn-card" id="turnIndicator">⚡ Ход: --</div>
            <button id="endTurnBtn" class="btn-secondary" style="background:#5a4a34;">⏩ Закончить ход</button>
        </div>

        <div id="roleSelection" class="role-panel">
            <h3 style="color:#ffda99;">🔰 Выберите роль</h3>
            <div class="role-buttons">
                <button class="role-btn" onclick="selectRole('red', false)">🔴 Игрок (Красные)</button>
                <button class="role-btn" onclick="selectRole('red', true)">👑 Шпион (Красные)</button>
                <button class="role-btn" onclick="selectRole('blue', false)">🔵 Игрок (Синие)</button>
                <button class="role-btn" onclick="selectRole('blue', true)">👑 Шпион (Синие)</button>
            </div>
            <div class="players-list" id="playersList">👥 Ожидание игроков...</div>
            <button id="forceStartBtn" class="btn-primary" style="background:#5f8b4c; margin-top:15px;">🚀 Принудительный старт</button>
        </div>

        <div id="gameBoard" style="display: none;">
            <div id="gameGrid" class="grid"></div>
        </div>

        <div id="spymasterView" style="display: none;" class="spymaster-panel">
            <h3 style="color:#ffd966;">🔮 КЛЮЧ-КАРТА (только вы)</h3>
            <div id="keyGrid" class="key-grid"></div>
        </div>
    </div>
</div>

<script>
    let socket = null;
    let currentRoomId = null;
    let myRole = null;
    let gameState = null;

    function showError(msg) {
        const errDiv = document.getElementById('errorMsg');
        errDiv.innerHTML = `<div class="error-text">❌ ${msg}</div>`;
        setTimeout(() => { errDiv.innerHTML = ''; }, 4000);
    }

    // 🔥 ТЕСТОВЫЙ РЕЖИМ (создаёт фейковую игру локально)
    function startSoloMode() {
        // Отключаемся от сервера, если были подключены
        if (socket) {
            socket.disconnect();
        }
        
        // Скрываем экран входа
        document.getElementById('joinScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        
        // Генерируем тестовые данные
        const testHeroes = [
            "Pudge", "Invoker", "Crystal Maiden", "Axe", "Anti-Mage",
            "Blink Dagger", "Black King Bar", "Aghanim", "Zeus", "Lina",
            "Windranger", "Shadow Blade", "Force Staff", "Ursa", "Juggernaut",
            "Techies", "Phantom Assassin", "Eul's Scepter", "Lion", "Queen of Pain",
            "Slark", "Monkey King Bar", "Heart", "Butterfly", "Radiance"
        ];
        
        const testColors = [
            "red", "red", "blue", "blue", "red",
            "neutral", "red", "assassin", "blue", "red",
            "neutral", "blue", "red", "neutral", "blue",
            "red", "blue", "neutral", "red", "blue",
            "neutral", "red", "blue", "neutral", "red"
        ];
        
        gameState = {
            cards: testHeroes,
            colors: testColors,
            revealed: new Array(25).fill(false),
            currentTurn: "red",
            gameActive: true,
            redRemaining: testColors.filter(c => c === "red").length,
            blueRemaining: testColors.filter(c => c === "blue").length
        };
        
        // Показываем выбор роли, но сразу предлагаем старт
        document.getElementById('roleSelection').style.display = 'block';
        document.getElementById('gameBoard').style.display = 'none';
        document.getElementById('spymasterView').style.display = 'none';
        
        // Обновляем счётчики
        updateRemainingDisplay();
        updateTurnDisplay();
        
        // Для теста создаём фейковый socket, чтобы кнопки не падали
        socket = {
            emit: (event, data) => {
                if (event === 'revealCard') {
                    // Эмулируем открытие карты локально
                    const idx = data.index;
                    if (!gameState.revealed[idx] && gameState.gameActive) {
                        const color = gameState.colors[idx];
                        gameState.revealed[idx] = true;
                        
                        if (color === "assassin") {
                            gameState.gameActive = false;
                            alert("💀 Убийца! Игра окончена!");
                        } else if (color === "red") {
                            gameState.redRemaining--;
                            if (gameState.redRemaining === 0) {
                                gameState.gameActive = false;
                                alert("🏆 ПОБЕДА КРАСНЫХ!");
                            }
                        } else if (color === "blue") {
                            gameState.blueRemaining--;
                            if (gameState.blueRemaining === 0) {
                                gameState.gameActive = false;
                                alert("🏆 ПОБЕДА СИНИХ!");
                            }
                        } else if (color === "neutral") {
                            gameState.currentTurn = gameState.currentTurn === "red" ? "blue" : "red";
                        }
                        
                        renderGameBoard();
                        updateRemainingDisplay();
                        updateTurnDisplay();
                    }
                }
                if (event === 'endTurn') {
                    gameState.currentTurn = gameState.currentTurn === "red" ? "blue" : "red";
                    updateTurnDisplay();
                }
                if (event === 'chooseRole') {
                    myRole = { team: data.team, isSpymaster: data.isSpymaster };
                    if (myRole.isSpymaster) {
                        document.getElementById('spymasterView').style.display = 'block';
                        renderSpymasterKey();
                    }
                }
            }
        };
        
        showError("✅ ТЕСТОВЫЙ РЕЖИМ: нажмите 'Принудительный старт'");
    }
    
    function createRoom() {
        if (socket) socket.disconnect();
        let roomId = document.getElementById('roomIdInput').value.trim();
        if (!roomId) roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        socket = io();
        socket.on('connect', () => socket.emit('createRoom', roomId));
        setupSocketHandlers();
    }

    function joinRoom() {
        let roomId = document.getElementById('roomIdInput').value.trim();
        if (!roomId) return showError('Введите ID комнаты');
        if (socket) socket.disconnect();
        socket = io();
        socket.on('connect', () => socket.emit('joinRoom', roomId));
        setupSocketHandlers();
    }

    function setupSocketHandlers() {
        socket.on('roomCreated', (data) => {
            currentRoomId = data.roomId;
            document.getElementById('joinScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
        });

        socket.on('joinedRoom', (data) => {
            currentRoomId = data.roomId;
            gameState = data.gameState;
            document.getElementById('joinScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            updateRemainingDisplay();
        });

        socket.on('playersUpdate', (data) => {
            const playersDiv = document.getElementById('playersList');
            if (!playersDiv) return;
            if (!data.players || data.players.length === 0) {
                playersDiv.innerHTML = '👥 В комнате никого нет';
                return;
            }
            let html = '<strong>👥 В комнате:</strong><br>';
            data.players.forEach(p => {
                let roleText = p.role?.team ? `${p.role.team === 'red' ? '🔴' : '🔵'} ${p.role.isSpymaster ? '🤴 Шпион' : '🗡️ Игрок'}` : '🤔 Не выбран';
                html += `🎭 ${p.id.substring(0,6)}: ${roleText}<br>`;
            });
            playersDiv.innerHTML = html;
        });

        socket.on('gameReady', (data) => {
            gameState = data.gameState;
            document.getElementById('roleSelection').style.display = 'none';
            document.getElementById('gameBoard').style.display = 'block';
            if (myRole && myRole.isSpymaster) {
                document.getElementById('spymasterView').style.display = 'block';
                renderSpymasterKey();
            }
            renderGameBoard();
            updateRemainingDisplay();
            updateTurnDisplay();
        });

        socket.on('cardRevealed', (data) => {
            if (gameState) {
                gameState.revealed[data.index] = true;
                if (data.turnChange) gameState.currentTurn = data.turnChange;
                if (data.remaining) {
                    gameState.redRemaining = data.remaining.red;
                    gameState.blueRemaining = data.remaining.blue;
                }
                renderGameBoard();
                updateRemainingDisplay();
                updateTurnDisplay();
            }
        });

        socket.on('turnChanged', (data) => {
            if (gameState) gameState.currentTurn = data.turn;
            updateTurnDisplay();
        });

        socket.on('gameStateUpdate', (data) => {
            if (gameState) {
                gameState.revealed = data.revealed;
                gameState.currentTurn = data.turn;
                renderGameBoard();
                updateTurnDisplay();
            }
        });

        socket.on('gameOver', (data) => {
            alert(`🏆 ПОБЕДА КОМАНДЫ ${data.winner.toUpperCase()}! 🏆`);
        });

        socket.on('error', (msg) => {
            showError(msg);
        });
    }

    function selectRole(team, isSpymaster) {
        myRole = { team, isSpymaster };
        if (socket && socket.emit) {
            socket.emit('chooseRole', { roomId: currentRoomId, team, isSpymaster });
        }
        if (isSpymaster && gameState) {
            document.getElementById('spymasterView').style.display = 'block';
            renderSpymasterKey();
        }
    }

    function renderGameBoard() {
        if (!gameState) return;
        const gridDiv = document.getElementById('gameGrid');
        if (!gridDiv) return;
        gridDiv.innerHTML = '';
        for (let i = 0; i < gameState.cards.length; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            if (gameState.revealed[i]) {
                card.classList.add(`revealed-${gameState.colors[i]}`);
                card.style.cursor = 'default';
            } else {
                card.style.cursor = 'pointer';
                let canClick = false;
                if (myRole && !myRole.isSpymaster && gameState.gameActive !== false && gameState.currentTurn === myRole.team) {
                    canClick = true;
                }
                if (canClick && socket && socket.emit) {
                    card.onclick = () => socket.emit('revealCard', { roomId: currentRoomId, index: i });
                } else {
                    card.style.cursor = 'not-allowed';
                }
            }
            card.innerText = gameState.cards[i];
            gridDiv.appendChild(card);
        }
    }

    function renderSpymasterKey() {
        if (!gameState) return;
        const keyContainer = document.getElementById('keyGrid');
        if (!keyContainer) return;
        keyContainer.innerHTML = '';
        for (let i = 0; i < gameState.colors.length; i++) {
            const cell = document.createElement('div');
            cell.className = `key-cell key-${gameState.colors[i]}`;
            if (gameState.colors[i] === 'assassin') cell.innerText = '💀';
            else if (gameState.colors[i] === 'red') cell.innerText = '🔴';
            else if (gameState.colors[i] === 'blue') cell.innerText = '🔵';
            else cell.innerText = '⚪';
            keyContainer.appendChild(cell);
        }
    }

    function updateRemainingDisplay() {
        if (gameState) {
            document.getElementById('redRemaining').innerText = gameState.redRemaining || 0;
            document.getElementById('blueRemaining').innerText = gameState.blueRemaining || 0;
        }
    }

    function updateTurnDisplay() {
        if (gameState) {
            document.getElementById('turnIndicator').innerHTML = gameState.currentTurn === 'red' ? '🔴 Ход красных' : '🔵 Ход синих';
        }
    }

    // Принудительный старт
    document.getElementById('forceStartBtn')?.addEventListener('click', () => {
        if (gameState) {
            document.getElementById('roleSelection').style.display = 'none';
            document.getElementById('gameBoard').style.display = 'block';
            if (myRole && myRole.isSpymaster) {
                document.getElementById('spymasterView').style.display = 'block';
                renderSpymasterKey();
            }
            renderGameBoard();
        } else {
            showError('Сначала создайте комнату или войдите в тестовый режим');
        }
    });

    document.getElementById('endTurnBtn')?.addEventListener('click', () => {
        if (socket && socket.emit && currentRoomId && gameState && myRole && !myRole.isSpymaster) {
            socket.emit('endTurn', { roomId: currentRoomId });
        }
    });
</script>
</body>
</html>
