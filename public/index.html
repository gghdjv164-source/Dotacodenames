<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎮 Коднеймс Dota 2 | Герои и предметы</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #1a472a, #0a1f0f);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* Контейнер */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Стильные карточки входа */
        .screen {
            background: rgba(20, 15, 10, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 30px;
            margin: 40px auto;
            max-width: 500px;
            text-align: center;
            border: 1px solid rgba(255, 215, 120, 0.5);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
        }

        .screen h2 {
            font-size: 2rem;
            color: #ffd966;
            text-shadow: 0 2px 5px #7a4c1a;
            margin-bottom: 25px;
        }

        .screen input {
            width: 90%;
            padding: 15px 20px;
            font-size: 1.2rem;
            background: #2e241a;
            border: 2px solid #d4a259;
            border-radius: 60px;
            color: white;
            text-align: center;
            outline: none;
            transition: 0.2s;
        }

        .screen input:focus {
            border-color: #ffb347;
            box-shadow: 0 0 12px #ffb347;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s linear;
            font-family: inherit;
            font-weight: 600;
        }

        .btn-primary {
            background: #e0a800;
            color: #1e2a0e;
            box-shadow: 0 4px 0 #7a4c00;
        }

        .btn-primary:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a4c00;
        }

        .btn-secondary {
            background: #3a2a1f;
            color: #ffdb9f;
            border: 1px solid #b8865b;
        }

        .btn-solo {
            background: #2e5e3b;
            color: #e9ffd6;
            border: 1px solid #96c280;
        }

        /* Игровой шапка */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: #1f1a15cc;
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 80px;
            margin-bottom: 25px;
            border: 1px solid #c9aa5b;
        }

        .team-badge {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            background: #1a1a1a;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
        }

        .red-team {
            background: #a12222;
            color: #ffc5c5;
            border-left: 5px solid #ff7b7b;
        }

        .blue-team {
            background: #1e5491;
            color: #cbe5ff;
            border-left: 5px solid #8bcbff;
        }

        .turn-card {
            background: #2c2b1f;
            padding: 8px 20px;
            border-radius: 32px;
            color: #ffdfa5;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Сетка карточек (эффект свечения) */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            margin: 25px 0;
        }

        .card {
            aspect-ratio: 1 / 0.9;
            background: linear-gradient(145deg, #fff0db, #fae5c3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            padding: 10px 6px;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 8px 0 #a57248;
            border: 2px solid #ffd699;
            color: #2c1e10;
            font-weight: 700;
            word-break: break-word;
        }

        .card.revealed-red {
            background: #c13b3b;
            color: white;
            box-shadow: 0 4px 0 #6e1a1a;
            transform: translateY(2px);
            border-color: #ffa2a2;
        }

        .card.revealed-blue {
            background: #3178b6;
            color: white;
            box-shadow: 0 4px 0 #1a446b;
            transform: translateY(2px);
        }

        .card.revealed-neutral {
            background: #7c6a53;
            color: #d9cfbc;
            text-decoration: line-through;
            filter: grayscale(0.15);
        }

        .card.revealed-assassin {
            background: #251f1c;
            color: #e06666;
            text-shadow: 0 0 3px black;
            box-shadow: 0 4px 0 #0f0f0f;
        }

        /* Панель ролей */
        .role-panel {
            background: #0c0a08c9;
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e0aa6e;
        }

        .role-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }

        .role-btn {
            background: #2b2a1f;
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid #ca9a5e;
            color: #ffe1ab;
            font-weight: bold;
            cursor: pointer;
            transition: 0.05s linear;
        }

        .role-btn:active {
            transform: scale(0.96);
        }

        .players-list {
            background: #00000066;
            border-radius: 28px;
            padding: 12px 18px;
            font-family: monospace;
            color: #fee6bf;
        }

        .spymaster-panel {
            background: #0b0806e0;
            border-radius: 36px;
            padding: 18px;
            margin-top: 20px;
            border: 2px solid #ffcf8a;
        }

        .key-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: #00000070;
            padding: 12px;
            border-radius: 28px;
        }

        .key-cell {
            aspect-ratio: 1;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.6rem;
            font-weight: 800;
        }

        .key-red { background: #e64343; box-shadow: inset 0 0 0 2px #ffbdbd; }
        .key-blue { background: #4682d9; box-shadow: inset 0 0 0 2px #b9dcff; }
        .key-neutral { background: #947e60; box-shadow: inset 0 0 0 2px #e7cfaa; }
        .key-assassin { background: #1f1b18; color: #ff6868; }

        .error-text {
            color: #ffa098;
            background: #3a1a1a;
            padding: 8px;
            border-radius: 40px;
        }

        @media (max-width: 700px) {
            .grid { gap: 8px; }
            .card { font-size: 0.7rem; }
            .role-btn { padding: 8px 12px; font-size: 0.8rem; }
        }

        button {
            font-family: inherit;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Экран входа -->
    <div id="joinScreen" class="screen">
        <h2>🎲 Коднеймс: Dota 2</h2>
        <input type="text" id="roomIdInput" placeholder="ID комнаты (например DOTA)">
        <div class="btn-group">
            <button class="btn btn-primary" onclick="createRoom()">✨ Создать комнату</button>
            <button class="btn btn-secondary" onclick="joinRoom()">🚪 Войти в комнату</button>
            <button class="btn btn-solo" onclick="startSoloMode()">🎮 Играть одному (тест)</button>
        </div>
        <div id="errorMsg" style="color: #ffbc7a; margin-top: 20px;"></div>
    </div>

    <!-- Игровой экран -->
    <div id="gameScreen" style="display: none;">
        <div class="game-header">
            <div class="team-badge red-team">🔴 КРАСНЫЕ: <span id="redRemaining">0</span></div>
            <div class="team-badge blue-team">🔵 СИНИЕ: <span id="blueRemaining">0</span></div>
            <div class="turn-card" id="turnIndicator">⚡ Ход: --</div>
            <button id="endTurnBtn" class="btn-secondary" style="background:#5a4a34;">⏩ Закончить ход</button>
        </div>

        <!-- Выбор роли -->
        <div id="roleSelection" class="role-panel">
            <h3 style="color:#ffda99;">🔰 Выберите роль</h3>
            <div class="role-buttons">
                <button class="role-btn" onclick="selectRole('red', false)">🔴 Игрок (Красные)</button>
                <button class="role-btn" onclick="selectRole('red', true)">👑 Шпион (Красные)</button>
                <button class="role-btn" onclick="selectRole('blue', false)">🔵 Игрок (Синие)</button>
                <button class="role-btn" onclick="selectRole('blue', true)">👑 Шпион (Синие)</button>
            </div>
            <div class="players-list" id="playersList">👥 Ожидание игроков...</div>
            <div style="margin-top: 15px;">
                <button id="forceStartBtn" class="btn-primary" style="background:#5f8b4c;">⚡ Старт (один игрок / тест)</button>
            </div>
        </div>

        <!-- Игровое поле -->
        <div id="gameBoard" style="display: none;">
            <div id="gameGrid" class="grid"></div>
        </div>

        <!-- Панель шпиона -->
        <div id="spymasterView" style="display: none;" class="spymaster-panel">
            <h3 style="color:#ffd966;">🔮 КЛЮЧ-КАРТА (только вы видите)</h3>
            <div id="keyGrid" class="key-grid"></div>
        </div>
    </div>
</div>

<script>
    let socket = null;
    let currentRoomId = null;
    let myRole = null;
    let gameState = null;
    let soloModeActive = false;

    function showError(msg) {
        const errDiv = document.getElementById('errorMsg');
        errDiv.innerText = msg;
        errDiv.classList.add('error-text');
        setTimeout(() => { errDiv.innerText = ''; errDiv.classList.remove('error-text'); }, 3500);
    }

    // 🔥 Соло-режим (бот-заглушка)
    function startSoloMode() {
        soloModeActive = true;
        // Создаём локальный псевдо-сокет
        if (socket) socket.disconnect();
        socket = io();
        socket.on('connect', () => {
            const roomId = 'SOLO_' + Math.random().toString(36).substring(2, 8);
            socket.emit('createRoom', roomId);
        });
        setupSocketHandlers(true);
    }

    function createRoom() {
        soloModeActive = false;
        let roomId = document.getElementById('roomIdInput').value.trim();
        if (!roomId) roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        if (socket) socket.disconnect();
        socket = io();
        socket.on('connect', () => socket.emit('createRoom', roomId));
        setupSocketHandlers(false);
    }

    function joinRoom() {
        soloModeActive = false;
        let roomId = document.getElementById('roomIdInput').value.trim();
        if (!roomId) return showError('❌ Введите ID комнаты');
        if (socket) socket.disconnect();
        socket = io();
        socket.on('connect', () => socket.emit('joinRoom', roomId));
        setupSocketHandlers(false);
    }

    function setupSocketHandlers(isSolo = false) {
        socket.on('roomCreated', (data) => {
            currentRoomId = data.roomId;
            document.getElementById('joinScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            if (isSolo) {
                // автоматически выбрать роль шпиона для соло
                setTimeout(() => {
                    selectRole('red', true);
                }, 200);
            }
        });

        socket.on('joinedRoom', (data) => {
            currentRoomId = data.roomId;
            gameState = data.gameState;
            document.getElementById('joinScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            updateRemainingDisplay();
        });

        socket.on('playersUpdate', (data) => {
            const playersDiv = document.getElementById('playersList');
            if (!playersDiv) return;
            if (data.players.length === 0) {
                playersDiv.innerHTML = '👥 В комнате никого нет';
                return;
            }
            let html = '<strong>👥 В комнате:</strong><br>';
            data.players.forEach(p => {
                let roleText = p.role.team ? `${p.role.team === 'red' ? '🔴' : '🔵'} ${p.role.isSpymaster ? '🤴 Шпион' : '🗡️ Игрок'}` : '🤔 Не выбран';
                html += `🎭 ${p.id.substring(0,6)}: ${roleText}<br>`;
            });
            playersDiv.innerHTML = html;
        });

        socket.on('gameReady', (data) => {
            gameState = data.gameState;
            document.getElementById('roleSelection').style.display = 'none';
            document.getElementById('gameBoard').style.display = 'block';
            if (myRole && myRole.isSpymaster) {
                document.getElementById('spymasterView').style.display = 'block';
                renderSpymasterKey();
            }
            renderGameBoard();
            updateRemainingDisplay();
            updateTurnDisplay();
        });

        socket.on('cardRevealed', (data) => {
            if (gameState) {
                gameState.revealed[data.index] = true;
                if (data.turnChange) gameState.currentTurn = data.turnChange;
                if (data.remaining) {
                    gameState.redRemaining = data.remaining.red;
                    gameState.blueRemaining = data.remaining.blue;
                }
                renderGameBoard();
                updateRemainingDisplay();
                updateTurnDisplay();
            }
        });

        socket.on('turnChanged', (data) => {
            if (gameState) gameState.currentTurn = data.turn;
            updateTurnDisplay();
        });

        socket.on('gameStateUpdate', (data) => {
            if (gameState) {
                gameState.revealed = data.revealed;
                gameState.currentTurn = data.turn;
                renderGameBoard();
                updateTurnDisplay();
            }
        });

        socket.on('gameOver', (data) => {
            alert(`🏆 ПОБЕДА КОМАНДЫ ${data.winner.toUpperCase()}! 🏆`);
        });

        socket.on('error', (msg) => {
            showError(msg);
        });
    }

    function selectRole(team, isSpymaster) {
        myRole = { team, isSpymaster };
        if (socket) {
            socket.emit('chooseRole', { roomId: currentRoomId, team, isSpymaster });
        }
        // Если соло-режим, показываем ключ мгновенно
        if (soloModeActive && isSpymaster && gameState) {
            setTimeout(() => {
                document.getElementById('spymasterView').style.display = 'block';
                renderSpymasterKey();
                document.getElementById('roleSelection').style.display = 'none';
                document.getElementById('gameBoard').style.display = 'block';
                renderGameBoard();
            }, 100);
        }
    }

    function renderGameBoard() {
        if (!gameState) return;
        const gridDiv = document.getElementById('gameGrid');
        if (!gridDiv) return;
        gridDiv.innerHTML = '';
        for (let i = 0; i < gameState.cards.length; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            if (gameState.revealed[i]) {
                card.classList.add(`revealed-${gameState.colors[i]}`);
                card.style.cursor = 'default';
            } else {
                card.style.cursor = 'pointer';
                let canClick = false;
                if (myRole && !myRole.isSpymaster && gameState.gameActive !== false && gameState.currentTurn === myRole.team) {
                    canClick = true;
                }
                if (canClick && socket) {
                    card.onclick = () => socket.emit('revealCard', { roomId: currentRoomId, index: i });
                } else {
                    card.style.cursor = 'not-allowed';
                    card.classList.add('disabled');
                }
            }
            card.innerText = gameState.cards[i];
            gridDiv.appendChild(card);
        }
    }

    function renderSpymasterKey() {
        if (!gameState) return;
        const keyContainer = document.getElementById('keyGrid');
        if (!keyContainer) return;
        keyContainer.innerHTML = '';
        for (let i = 0; i < gameState.colors.length; i++) {
            const cell = document.createElement('div');
            cell.className = `key-cell key-${gameState.colors[i]}`;
            if (gameState.colors[i] === 'assassin') cell.innerText = '💀';
            else if (gameState.colors[i] === 'red') cell.innerText = '🔴';
            else if (gameState.colors[i] === 'blue') cell.innerText = '🔵';
            else cell.innerText = '⚪';
            keyContainer.appendChild(cell);
        }
    }

    function updateRemainingDisplay() {
        if (gameState) {
            document.getElementById('redRemaining').innerText = gameState.redRemaining || 0;
            document.getElementById('blueRemaining').innerText = gameState.blueRemaining || 0;
        }
    }

    function updateTurnDisplay() {
        if (gameState) {
            document.getElementById('turnIndicator').innerHTML = gameState.currentTurn === 'red' ? '🔴 Ход красных' : '🔵 Ход синих';
        }
    }

    // Принудительный старт для одиночного тестирования
    document.getElementById('forceStartBtn')?.addEventListener('click', () => {
        if (gameState && socket && currentRoomId) {
            // Для соло или дебага: эмулируем начало игры
            const mockGameReady = { gameState: gameState };
            document.getElementById('roleSelection').style.display = 'none';
            document.getElementById('gameBoard').style.display = 'block';
            if (myRole && myRole.isSpymaster) {
                document.getElementById('spymasterView').style.display = 'block';
                renderSpymasterKey();
            }
            renderGameBoard();
            updateRemainingDisplay();
            updateTurnDisplay();
        } else {
            showError('Сначала войдите или создайте комнату');
        }
    });

    document.getElementById('endTurnBtn')?.addEventListener('click', () => {
        if (!socket || !currentRoomId) return;
        if (gameState && myRole && !myRole.isSpymaster) {
            socket.emit('endTurn', { roomId: currentRoomId });
        }
    });
</script>
</body>
</html>
